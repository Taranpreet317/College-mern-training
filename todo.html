<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Notes</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cork: #c8a96e;
        --cork-dark: #a8844a;
        --bg: #8b6914;
        --cream: #fdf6e3;
        --text-dark: #3b2a0e;
        --shadow: rgba(40, 20, 5, 0.35);
      }

      body {
        font-family: "Nunito", sans-serif;
        background: var(--bg);
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        border: 22px solid #5c3d11;
        box-shadow:
          inset 0 0 0 4px #7a5220,
          inset 0 0 0 7px #3d2509;
        pointer-events: none;
      }

      #board {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding: 28px 32px 100px;
        background:
          repeating-linear-gradient(
            105deg,
            transparent,
            transparent 18px,
            rgba(160, 100, 30, 0.07) 18px,
            rgba(160, 100, 30, 0.07) 19px
          ),
          repeating-linear-gradient(
            15deg,
            transparent,
            transparent 22px,
            rgba(120, 70, 10, 0.06) 22px,
            rgba(120, 70, 10, 0.06) 23px
          ),
          radial-gradient(
            ellipse at 20% 30%,
            #d4aa66 0%,
            #c09040 40%,
            #a87030 100%
          );
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 14px;
        margin-bottom: 32px;
        padding-bottom: 16px;
        border-bottom: 3px dashed rgba(80, 40, 5, 0.25);
      }

      .title-wrap h1 {
        font-family: "Caveat", cursive;
        font-size: 2.8rem;
        font-weight: 700;
        color: var(--text-dark);
        text-shadow: 1px 2px 0 rgba(255, 255, 255, 0.3);
        letter-spacing: 1px;
      }
      .title-wrap p {
        font-size: 0.9rem;
        color: rgba(59, 42, 14, 0.65);
        margin-top: 2px;
      }

      #add-btn {
        background: #e8a020;
        color: #fff;
        border: none;
        border-radius: 50px;
        padding: 13px 26px;
        font-family: "Nunito", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow:
          0 4px 14px rgba(140, 70, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        gap: 8px;
        transition:
          transform 0.15s,
          box-shadow 0.15s,
          background 0.15s;
        letter-spacing: 0.3px;
      }
      #add-btn:hover {
        background: #d4900a;
        transform: translateY(-2px);
        box-shadow: 0 7px 20px rgba(140, 70, 0, 0.45);
      }
      #add-btn:active {
        transform: translateY(0);
      }
      #add-btn .plus {
        font-size: 1.4rem;
        line-height: 1;
      }

      #notes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 28px 22px;
      }

      #empty {
        grid-column: 1/-1;
        text-align: center;
        padding: 60px 20px;
        color: rgba(59, 42, 14, 0.5);
      }
      #empty .emoji {
        font-size: 4rem;
        display: block;
        margin-bottom: 12px;
      }
      #empty p {
        font-family: "Caveat", cursive;
        font-size: 1.5rem;
      }

      .note {
        position: relative;
        border-radius: 3px;
        padding: 40px 18px 18px;
        min-height: 180px;
        box-shadow:
          3px 5px 18px var(--shadow),
          1px 1px 0 rgba(255, 255, 255, 0.15) inset;
        animation: dropIn 0.35s cubic-bezier(0.22, 1.2, 0.4, 1) both;
        cursor: default;
        word-break: break-word;
        display: flex;
        flex-direction: column;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .note:hover {
        transform: rotate(0deg) scale(1.03) translateY(-3px) !important;
        box-shadow: 5px 10px 28px var(--shadow);
      }

      @keyframes dropIn {
        from {
          opacity: 0;
          transform: scale(0.85) translateY(-20px);
        }
        to {
          opacity: 1;
        }
      }

      .note::before {
        content: "";
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ff7070, #cc1f1f);
        box-shadow:
          0 2px 8px rgba(0, 0, 0, 0.45),
          inset 0 1px 2px rgba(255, 180, 180, 0.5);
        z-index: 2;
      }

      .note-text {
        font-family: "Caveat", cursive;
        font-size: 1.25rem;
        line-height: 1.55;
        color: #2d1f08;
        flex: 1;
        white-space: pre-wrap;
      }

      .note-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 14px;
        gap: 6px;
      }
      .note-date {
        font-size: 0.72rem;
        color: rgba(40, 20, 5, 0.45);
        font-family: "Nunito", sans-serif;
      }
      .note-actions {
        display: flex;
        gap: 6px;
      }

      .btn-icon {
        background: rgba(0, 0, 0, 0.08);
        border: none;
        border-radius: 6px;
        width: 30px;
        height: 30px;
        cursor: pointer;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn-icon:hover {
        background: rgba(0, 0, 0, 0.18);
        transform: scale(1.15);
      }

      .note-colors-strip {
        position: absolute;
        top: 10px;
        left: 16px;
        display: flex;
        gap: 6px;
      }
      .color-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid rgba(0, 0, 0, 0.15);
        transition:
          transform 0.15s,
          border-color 0.15s;
      }
      .color-dot:hover,
      .color-dot.active {
        transform: scale(1.35);
        border-color: rgba(0, 0, 0, 0.45);
      }

      #modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 200;
        background: rgba(20, 10, 0, 0.6);
        backdrop-filter: blur(3px);
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      #modal-overlay.open {
        display: flex;
      }

      #modal {
        background: var(--cream);
        border-radius: 12px;
        width: 100%;
        max-width: 420px;
        padding: 32px 28px 24px;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        animation: modalIn 0.3s cubic-bezier(0.22, 1.2, 0.4, 1);
        position: relative;
      }
      @keyframes modalIn {
        from {
          opacity: 0;
          transform: scale(0.88) translateY(20px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      #modal h2 {
        font-family: "Caveat", cursive;
        font-size: 1.8rem;
        color: var(--text-dark);
        margin-bottom: 18px;
      }

      #modal-preview-strip {
        display: flex;
        gap: 10px;
        margin-bottom: 18px;
        flex-wrap: wrap;
      }
      .modal-color-chip {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        cursor: pointer;
        border: 3px solid transparent;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        transition:
          transform 0.15s,
          border-color 0.15s;
      }
      .modal-color-chip:hover {
        transform: scale(1.12);
      }
      .modal-color-chip.selected {
        border-color: #3b2a0e;
        transform: scale(1.12);
      }

      #note-textarea {
        width: 100%;
        min-height: 130px;
        border: 2px solid rgba(59, 42, 14, 0.18);
        border-radius: 8px;
        padding: 12px 14px;
        font-family: "Caveat", cursive;
        font-size: 1.2rem;
        line-height: 1.55;
        color: #2d1f08;
        resize: vertical;
        outline: none;
        background: rgba(255, 255, 255, 0.7);
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      #note-textarea:focus {
        border-color: #e8a020;
        background: #fff;
      }
      #char-count {
        text-align: right;
        font-size: 0.75rem;
        color: rgba(59, 42, 14, 0.45);
        margin-top: 4px;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
        justify-content: flex-end;
      }

      .btn-cancel {
        background: rgba(59, 42, 14, 0.1);
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        font-family: "Nunito", sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        color: var(--text-dark);
        transition: background 0.15s;
      }
      .btn-cancel:hover {
        background: rgba(59, 42, 14, 0.18);
      }

      .btn-save {
        background: #e8a020;
        border: none;
        border-radius: 8px;
        padding: 10px 24px;
        font-family: "Nunito", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        color: #fff;
        box-shadow: 0 3px 12px rgba(140, 70, 0, 0.35);
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn-save:hover {
        background: #d4900a;
        transform: translateY(-1px);
      }
      .btn-save:disabled {
        background: #ccc;
        cursor: default;
        transform: none;
        box-shadow: none;
      }

      #delete-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 300;
        background: rgba(20, 10, 0, 0.65);
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      #delete-overlay.open {
        display: flex;
      }
      #delete-box {
        background: var(--cream);
        border-radius: 12px;
        padding: 28px 28px 22px;
        max-width: 340px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        animation: modalIn 0.25s ease both;
      }
      #delete-box .del-icon {
        font-size: 2.8rem;
        margin-bottom: 10px;
      }
      #delete-box h3 {
        font-family: "Caveat", cursive;
        font-size: 1.6rem;
        color: var(--text-dark);
        margin-bottom: 8px;
      }
      #delete-box p {
        font-size: 0.9rem;
        color: rgba(59, 42, 14, 0.6);
        margin-bottom: 20px;
      }
      .del-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      .btn-del-confirm {
        background: #e53935;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 22px;
        font-family: "Nunito", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 3px 10px rgba(180, 0, 0, 0.3);
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn-del-confirm:hover {
        background: #c62828;
        transform: translateY(-1px);
      }

      #toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #3b2a0e;
        color: #fdf6e3;
        border-radius: 50px;
        padding: 10px 24px;
        font-size: 0.9rem;
        font-family: "Nunito", sans-serif;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.3s,
          transform 0.3s;
        z-index: 999;
      }
      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.1);
      }
      ::-webkit-scrollbar-thumb {
        background: #a07030;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="board">
      <header>
        <div class="title-wrap">
          <h1>📌 My Board</h1>
          <p id="note-count">Loading…</p>
        </div>
        <button id="add-btn"><span class="plus">+</span> Add Note</button>
      </header>
      <div id="notes-grid"></div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal-overlay">
      <div id="modal">
        <h2 id="modal-title">✏️ New Note</h2>
        <div id="modal-preview-strip"></div>
        <textarea
          id="note-textarea"
          placeholder="Write something…"
          maxlength="400"
        ></textarea>
        <div id="char-count">0 / 400</div>
        <div class="modal-actions">
          <button class="btn-cancel" id="modal-cancel">Cancel</button>
          <button class="btn-save" id="modal-save" disabled>Save Note</button>
        </div>
      </div>
    </div>

    <!-- Delete Confirm -->
    <div id="delete-overlay">
      <div id="delete-box">
        <div class="del-icon">🗑️</div>
        <h3>Delete this note?</h3>
        <p>It'll be gone for good — no undo!</p>
        <div class="del-actions">
          <button class="btn-cancel" id="del-cancel">Keep it</button>
          <button class="btn-del-confirm" id="del-confirm">Yes, delete</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      const COLORS = [
        { bg: "#FFF176", line: "#F9A825" },
        { bg: "#FFD180", line: "#FF6D00" },
        { bg: "#F48FB1", line: "#C2185B" },
        { bg: "#80DEEA", line: "#006064" },
        { bg: "#A5D6A7", line: "#1B5E20" },
        { bg: "#CE93D8", line: "#4A148C" },
      ];
      const TILTS = [-3, -2, -1, 0, 1, 2, 3];

      let notes = [];
      let editingId = null;
      let deletingId = null;
      let selectedColor = 0;

      const grid = document.getElementById("notes-grid");
      const countEl = document.getElementById("note-count");
      const textarea = document.getElementById("note-textarea");
      const charCount = document.getElementById("char-count");
      const saveBtn = document.getElementById("modal-save");
      const modalOverlay = document.getElementById("modal-overlay");
      const deleteOverlay = document.getElementById("delete-overlay");
      const previewStrip = document.getElementById("modal-preview-strip");
      const toast = document.getElementById("toast");

      function load() {
        try {
          notes = JSON.parse(localStorage.getItem("sticky-notes") || "[]");
        } catch {
          notes = [];
        }
      }
      function save() {
        localStorage.setItem("sticky-notes", JSON.stringify(notes));
      }

      function render() {
        grid.innerHTML = "";
        countEl.textContent =
          notes.length === 0
            ? "Your board is empty — add your first note!"
            : `${notes.length} note${notes.length !== 1 ? "s" : ""} on the board`;

        if (notes.length === 0) {
          grid.innerHTML = `<div id="empty"><span class="emoji">📝</span><p>Click <strong>+ Add Note</strong> to get started!</p></div>`;
          return;
        }

        notes.forEach((note) => {
          const c = COLORS[note.colorIdx] || COLORS[0];
          const card = document.createElement("div");
          card.className = "note";
          card.dataset.id = note.id;
          card.style.cssText = `background:${c.bg}; transform:rotate(${note.tilt}deg);
        background-image: repeating-linear-gradient(transparent, transparent 27px, ${c.line}55 27px, ${c.line}55 28px);
        background-position: 0 38px;`;

          card.innerHTML = `
        <div class="note-colors-strip" data-id="${note.id}"></div>
        <div class="note-text">${escHtml(note.text)}</div>
        <div class="note-footer">
          <span class="note-date">${note.date}</span>
          <div class="note-actions">
            <button class="btn-icon edit-btn" title="Edit" data-id="${note.id}">✏️</button>
            <button class="btn-icon del-btn" title="Delete" data-id="${note.id}">🗑️</button>
          </div>
        </div>`;

          const strip = card.querySelector(".note-colors-strip");
          COLORS.forEach((cc, i) => {
            const dot = document.createElement("div");
            dot.className =
              "color-dot" + (i === note.colorIdx ? " active" : "");
            dot.style.background = cc.bg;
            dot.style.border = `2px solid ${cc.line}`;
            dot.title = "Change color";
            dot.addEventListener("click", (e) => {
              e.stopPropagation();
              quickColorChange(note.id, i);
            });
            strip.appendChild(dot);
          });

          grid.appendChild(card);
        });
      }

      function quickColorChange(id, colorIdx) {
        const note = notes.find((n) => n.id === id);
        if (!note) return;
        note.colorIdx = colorIdx;
        save();
        render();
        showToast("Color changed!");
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\n/g, "<br>");
      }

      function buildColorStrip() {
        previewStrip.innerHTML = "";
        COLORS.forEach((c, i) => {
          const chip = document.createElement("div");
          chip.className =
            "modal-color-chip" + (i === selectedColor ? " selected" : "");
          chip.style.background = c.bg;
          chip.style.boxShadow = `0 2px 6px ${c.line}66`;
          chip.title = `Color ${i + 1}`;
          chip.addEventListener("click", () => {
            selectedColor = i;
            buildColorStrip();
          });
          previewStrip.appendChild(chip);
        });
      }

      function openModal(note = null) {
        editingId = note ? note.id : null;
        selectedColor = note ? note.colorIdx : 0;
        textarea.value = note ? note.text : "";
        charCount.textContent = `${textarea.value.length} / 400`;
        saveBtn.disabled = textarea.value.trim() === "";
        document.getElementById("modal-title").textContent = note
          ? "✏️ Edit Note"
          : "✏️ New Note";
        saveBtn.textContent = note ? "Save Changes" : "Save Note";
        buildColorStrip();
        modalOverlay.classList.add("open");
        setTimeout(() => textarea.focus(), 80);
      }

      function closeModal() {
        modalOverlay.classList.remove("open");
      }

      textarea.addEventListener("input", () => {
        charCount.textContent = `${textarea.value.length} / 400`;
        saveBtn.disabled = textarea.value.trim() === "";
      });

      document
        .getElementById("modal-cancel")
        .addEventListener("click", closeModal);
      modalOverlay.addEventListener("click", (e) => {
        if (e.target === modalOverlay) closeModal();
      });

      saveBtn.addEventListener("click", () => {
        const text = textarea.value.trim();
        if (!text) return;
        const now = new Date().toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });

        if (editingId) {
          const note = notes.find((n) => n.id === editingId);
          if (note) {
            note.text = text;
            note.colorIdx = selectedColor;
            note.date = now + " (edited)";
          }
          showToast("Note updated ✓");
        } else {
          notes.unshift({
            id: Date.now(),
            text,
            colorIdx: selectedColor,
            date: now,
            tilt: TILTS[Math.floor(Math.random() * TILTS.length)],
          });
          showToast("Note added! 📌");
        }
        save();
        render();
        closeModal();
      });

      function openDelete(id) {
        deletingId = id;
        deleteOverlay.classList.add("open");
      }
      function closeDelete() {
        deleteOverlay.classList.remove("open");
        deletingId = null;
      }

      document
        .getElementById("del-cancel")
        .addEventListener("click", closeDelete);
      deleteOverlay.addEventListener("click", (e) => {
        if (e.target === deleteOverlay) closeDelete();
      });
      document.getElementById("del-confirm").addEventListener("click", () => {
        notes = notes.filter((n) => n.id !== deletingId);
        save();
        render();
        closeDelete();
        showToast("Note deleted 🗑️");
      });

      grid.addEventListener("click", (e) => {
        const editBtn = e.target.closest(".edit-btn");
        const delBtn = e.target.closest(".del-btn");
        if (editBtn) {
          const note = notes.find((n) => n.id === +editBtn.dataset.id);
          if (note) openModal(note);
        }
        if (delBtn) openDelete(+delBtn.dataset.id);
      });

      document
        .getElementById("add-btn")
        .addEventListener("click", () => openModal());

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeModal();
          closeDelete();
        }
        if (
          (e.ctrlKey || e.metaKey) &&
          e.key === "Enter" &&
          modalOverlay.classList.contains("open")
        )
          saveBtn.click();
      });

      let toastTimer;
      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
      }

      load();
      render();
    </script>
  </body>
</html>
